<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body role="main">
    <div class="container d-flex justify-content-center vh-100">
        <div class="col-12 col-md-6 justify-content-center align-self-center">
            <h1>Search weather info</h1>
            <form id="weather-form" onsubmit="event.preventDefault(); getWeather();">
                <input type="text" class="form-control mb-2 bg-dark-subtle rounded-pill" id="city" list="city-list" placeholder="Enter a city" autofocus>
                <datalist id="city-list"></datalist>
                <div class="d-grid gap-1 d-lg-block">
                    <button class="btn btn-primary rounded-pill" type="submit"><i class="bi bi-search"></i> Search</button>
                    <button class="btn btn-danger rounded-pill" type="button" onclick="getLocation()"><i class="bi bi-geo-alt-fill"></i> Locate</button>
                </div>
            </form> 
            <div class="vstack justify-content-center align-items-center">
                <img class="img-fluid" id="weather-icon">
                <div id="temp-div"></div>
                <div id="weather-info"></div>
                <div class="hstack overflow-x-auto justify-content-between" id="hourly-forecast"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script src="js/locate.js" defer></script>
    <script src="js/search.js" defer></script>
</body>
</html>
